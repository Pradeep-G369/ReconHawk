<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReconHawk {% block title %}{% endblock %}</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', monospace; background: #0d1117; color: #c9d1d9; }
  nav { background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 24px;
        display: flex; align-items: center; gap: 24px; }
  nav .logo { font-size: 20px; font-weight: bold; color: #58a6ff; }
  nav a { color: #8b949e; text-decoration: none; font-size: 14px; }
  nav a:hover { color: #58a6ff; }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px;
          padding: 20px; margin-bottom: 16px; }
  .card h2 { font-size: 16px; color: #58a6ff; margin-bottom: 14px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px;
           font-size: 12px; font-weight: bold; }
  .badge-critical { background: #ff000033; color: #ff6b6b; border: 1px solid #ff0000; }
  .badge-high     { background: #ff660033; color: #ffa07a; border: 1px solid #ff6600; }
  .badge-medium   { background: #ffaa0033; color: #ffd700; border: 1px solid #ffaa00; }
  .badge-low      { background: #00aa0033; color: #90ee90; border: 1px solid #00aa00; }
  .badge-none     { background: #88888833; color: #aaaaaa; border: 1px solid #888888; }
  .badge-info     { background: #58a6ff33; color: #58a6ff; border: 1px solid #58a6ff; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #1c2128; color: #8b949e; padding: 8px 12px;
       text-align: left; border-bottom: 1px solid #30363d; }
  td { padding: 8px 12px; border-bottom: 1px solid #21262d; }
  tr:hover td { background: #1c2128; }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .stat-box { background: #1c2128; border: 1px solid #30363d; border-radius: 6px;
              padding: 16px; text-align: center; }
  .stat-num { font-size: 28px; font-weight: bold; }
  .stat-label { font-size: 12px; color: #8b949e; margin-top: 4px; }
  .btn { display: inline-block; padding: 6px 14px; border-radius: 6px;
         font-size: 13px; text-decoration: none; cursor: pointer; border: none; }
  .btn-blue  { background: #1f6feb; color: white; }
  .btn-green { background: #238636; color: white; }
  .btn-red   { background: #da3633; color: white; }
  .btn:hover { opacity: 0.85; }
  h1 { font-size: 22px; margin-bottom: 20px; color: #e6edf3; }
  .tag { font-size: 11px; padding: 2px 6px; border-radius: 3px;
         background: #21262d; color: #8b949e; font-family: monospace; }
</style>
</head>
<body>
<nav>
  <span class="logo">🦅 ReconHawk</span>
  <a href="/">Dashboard</a>
  <a href="/alerts">Alerts</a>
</nav>
<div class="container">
{% block content %}{% endblock %}
</div>
</body>
</html>
